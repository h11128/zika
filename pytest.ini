[pytest]
testpaths = tests
addopts = -q --maxfail=1 -m "not slow"
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
markers =
    integration: Integration tests across multiple modules and layers
    performance: Performance and caching tests (may be slow)
    slow: Slow-running tests not suitable for quick checks
    e2e: End-to-end user workflow tests
    ui: UI/preview-related tests (HTML generation, layout, components)

