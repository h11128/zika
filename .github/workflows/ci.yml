name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt


    - name: Run tests with coverage
      run: |
        python -m pytest --cov --cov-report=term-missing --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  e2e-tests:
    runs-on: ubuntu-latest
    needs: test  # Run E2E tests only after unit tests pass

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache npm dependencies
      uses: actions/cache@v3
      with:
        path: tests/playwright-ts/node_modules
        key: ${{ runner.os }}-npm-${{ hashFiles('tests/playwright-ts/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Node.js dependencies
      run: |
        cd tests/playwright-ts
        npm ci

    - name: Install Playwright browsers (PR)
      if: github.event_name == 'pull_request'
      run: |
        cd tests/playwright-ts
        npx playwright install --with-deps chromium firefox webkit

    - name: Install Playwright browsers (push/schedule)
      if: github.event_name == 'push' || github.event_name == 'schedule'
      run: |
        cd tests/playwright-ts
        npx playwright install --with-deps chromium firefox webkit


    - name: Run E2E smoke tests (PR)
      if: github.event_name == 'pull_request'
      run: |
        cd tests/playwright-ts
        # Chromium critical smoke
        npm run test:ci -- --project=chromium --grep "@critical"
        # Cross-browser smoke on key scenarios (Firefox/WebKit)
        npm run test:ci -- --project=firefox --grep "Interleaved Layout|Complex Custom Color"
        npm run test:ci -- --project=webkit --grep "Interleaved Layout|Complex Custom Color"
      env:
        CI: true

    - name: Run full E2E tests (main branch)
      if: github.event_name == 'push'
      run: |
        cd tests/playwright-ts
        # Full chromium run
        npm run test:ci -- --project=chromium
        # Cross-browser key scenarios
        npm run test:ci -- --project=firefox --grep "Interleaved Layout|Complex Custom Color"
        npm run test:ci -- --project=webkit --grep "Interleaved Layout|Complex Custom Color"
      env:
        CI: true

    - name: Run nightly stress E2E (scheduled)
      if: github.event_name == 'schedule'
      run: |
        cd tests/playwright-ts
        # Chromium full + stress
        npm run test:ci -- --project=chromium
        npm run test:ci -- --project=chromium --grep "@stress"
        # Cross-browser key scenarios
        npm run test:ci -- --project=firefox --grep "Interleaved Layout|Complex Custom Color"
        npm run test:ci -- --project=webkit --grep "Interleaved Layout|Complex Custom Color"
      env:
        CI: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: e2e-test-results
        path: tests/playwright-ts/test-results/
        retention-days: 7

    - name: Upload test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-test-report
        path: tests/playwright-ts/playwright-report/
        retention-days: 30
